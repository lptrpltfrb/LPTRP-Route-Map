<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Route Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{
margin:0;
padding:0;
}

#map{
width:1170px;
height:800px;
margin:auto;
}
</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// GOOGLE SHEET CSV
const sheetCSV="https://docs.google.com/spreadsheets/d/e/2PACX-1vRyCBsc0sCJs7FXH1Q1XEiCuMrV_ckVg9tcMvozYThFJfqpcOPdlo6YqxBYf6I1zHO0-yQZ_vz3knSS/pub?gid=1233383270&single=true&output=csv";


// CREATE MAP
const map=L.map("map").setView([12.8797,121.7740],6);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
maxZoom:18
}).addTo(map);


// RANDOM COLOR
function randomColor(){

const letters="0123456789ABCDEF";
let color="#";

for(let i=0;i<6;i++){
color+=letters[Math.floor(Math.random()*16)];
}

return color;

}


// MERGE GEO PATH PARTS
function mergeGeoPaths(row,prefix){

let coords=[];

for(let i=1;i<=5;i++){

let cell=row[prefix+"-"+i];

if(cell && cell.trim()!==""){

try{

let part=JSON.parse(cell);

part.forEach(function(c){

// convert [lng,lat] → [lat,lng]
coords.push([c[1],c[0]]);

});

}catch(e){

console.log("Bad GEO PATH:",prefix+"-"+i);

}

}

}

if(coords.length>0){
return coords;
}else{
return null;
}

}


// SIMPLE CSV PARSER
function parseCSV(text){

let lines=text.split("\n");
let headers=lines[0].split(",");

let rows=[];

for(let i=1;i<lines.length;i++){

let row={};
let cols=lines[i].split(",");

headers.forEach(function(h,j){
row[h.trim()]=cols[j];
});

rows.push(row);

}

return rows;

}


// LOAD SHEET
fetch(sheetCSV)

.then(function(res){
return res.text();
})

.then(function(text){

let data=parseCSV(text);

data.forEach(function(row){

// skip superseded
if(row["STATUS"]==="Superseded") return;


// OUTBOUND ROUTE
let route1=mergeGeoPaths(row,"GEO PATH 1");

if(route1){

L.polyline(route1,{
color:randomColor(),
weight:3
}).addTo(map);

}


// RETURN ROUTE
let route2=mergeGeoPaths(row,"GEO PATH 2");

if(route2){

L.polyline(route2,{
color:randomColor(),
weight:3,
dashArray:"6,6"
}).addTo(map);

}

});

});

</script>

</body>
</html>
