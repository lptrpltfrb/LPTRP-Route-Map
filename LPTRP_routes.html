<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Route Map Step 1</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  #map { height: 800px; width: 1170px; }
</style>
</head>
<body>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<!-- PapaParse for CSV parsing -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<script>
const map = L.map('map').setView([12.8797, 121.7740], 6); // Centered on Philippines

// Base layer
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors'
}).addTo(map);

// URL to published Google Sheet CSV
const sheetCSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRyCBsc0sCJs7FXH1Q1XEiCuMrV_ckVg9tcMvozYThFJfqpcOPdlo6YqxBYf6I1zHO0-yQZ_vz3knSS/pub?gid=1233383270&single=true&output=csv"; // <-- replace with your published CSV link

// Helper: parse GEO PATH columns into one coordinate array
function mergeGeoPaths(row, prefix) {
  let coords = [];
  for (let i = 1; i <= 5; i++) {
    let cell = row[`${prefix}-${i}`];
    if (cell && cell.trim() !== '') {
      try {
        let part = JSON.parse(cell); // Expecting JSON array [[lat,lng],[lat,lng],...]
        coords = coords.concat(part);
      } catch(e) {
        console.warn(`Invalid JSON in ${prefix}-${i}:`, cell);
      }
    }
  }
  return coords.length ? coords : null;
}

// Load CSV
Papa.parse(sheetCSV, {
  download: true,
  header: true,
  skipEmptyLines: true,
  complete: function(results) {
    const data = results.data;

    data.forEach(row => {
      if (row['STATUS'] && row['STATUS'].toLowerCase() === 'superseded') return;

      // Outbound route
      const routeOut = mergeGeoPaths(row, 'GEO PATH 1');
      if (routeOut) {
        L.polyline(routeOut, {
          color: getRandomColor(),
          weight: 4,
          opacity: 0.7
        }).addTo(map);
      }

      // Return route
      const routeBack = mergeGeoPaths(row, 'GEO PATH 2');
      if (routeBack) {
        L.polyline(routeBack, {
          color: getRandomColor(),
          weight: 4,
          opacity: 0.7
        }).addTo(map);
      }
    });
  }
});

// Random color generator
function getRandomColor() {
  return '#' + Math.floor(Math.random()*16777215).toString(16);
}
</script>

</body>
</html>
