<!DOCTYPE html>
<html>
<head>
  <title>LPTRP Route Map — Routes + Terminals</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    html,body{height:100%;margin:0;padding:0;background:#f5f6f7}
    #map { width: 100%; height: 100vh; margin: 0; box-shadow: 0 2px 6px rgba(0,0,0,.15); }

    .search-container {
      position: absolute;
      left: 12px;
      top: 12px;
      width: 340px;
      max-height: 90vh;
      overflow: auto;
      background: #fff;
      padding: 10px;
      border-radius: 8px;
      box-shadow: 0 6px 18px rgba(0,0,0,.15);
      z-index: 2000;
      font-family: Arial, Helvetica, sans-serif;
      font-size: 13px;
    }
    .search-section { margin-bottom: 10px; }
    .search-section h4 { margin: 6px 0; font-size: 14px; }
    input[type="text"], .small-input {
      width:100%;
      padding:6px 8px;
      border:1px solid #ccc;
      border-radius:4px;
      box-sizing:border-box;
      font-size:13px;
      outline:none;
    }
    .chips { display:flex; flex-wrap:wrap; gap:6px; min-height:34px; padding:6px; border:1px solid #ddd; border-radius:4px; background:#fff; }
    .chip { background:#2f78a0; color:#fff; padding:4px 8px; border-radius:14px; display:inline-flex; gap:6px; align-items:center; font-size:12px; }
    .chip button { background:transparent; border:0; color:#fff; cursor:pointer; font-weight:bold; }
    .btn { width:100%; padding:8px; border-radius:6px; border:0; cursor:pointer; margin-top:8px; font-size:14px; }
    .btn.apply { background:#2f78a0; color:#fff; }
    .btn.clear { background:#efefef; color:#222; }
    .suggestions { position: relative; }
    .suggestions-list {
      position: absolute; left:0; right:0; top:42px; max-height:180px; overflow:auto;
      background:#fff; border:1px solid #ccc; border-radius:4px; z-index:2100; display:none;
    }
    .suggestions-list div { padding:6px 8px; cursor:pointer; }
    .suggestions-list div:hover { background:#f0f8ff; }
    .north-arrow {
      position: absolute; right: 18px; top: 18px; z-index: 2000; width: 40px; height: 40px;
      background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><g fill="%23000"><path d="M50 5 L70 70 L50 55 L30 70 Z"/></g><text x="50" y="95" font-size="12" text-anchor="middle" fill="%23000">N</text></svg>') no-repeat center/contain;
      pointer-events: none; opacity: .95;
    }
    .hover-count .leaflet-popup-content { margin:6px 8px; font-weight:700; font-size:13px; text-align:center; color:#fff; }
    .hover-count .leaflet-popup-content-wrapper { background: rgba(0,0,0,0.8); border-radius:6px; }
    .route-list-panel {
      position: absolute; right: 12px; bottom: 12px; z-index: 5000; min-width: 300px; max-height: 360px;
      overflow:auto; background: rgba(255,255,255,0.98); border-radius: 8px; padding: 10px; font-family: Arial; font-size: 13px;
    }
    .terminal-marker { display:flex; align-items:center; justify-content:center; color:#fff; font-weight:700; border: 1px solid #fff; transition: transform .12s ease; }
    .terminal-marker:hover { transform: scale(1.35); z-index: 6000; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div class="north-arrow" title="North"></div>

  <div class="search-container" id="searchPanel">
    <div class="search-section">
      <h4>Search by Route Name</h4>
      <div class="chips" id="routeChips"></div>
      <div class="suggestions" style="margin-top:8px;">
        <input id="routeInput" type="text" placeholder="Type route name..." class="small-input" autocomplete="off" />
        <div class="suggestions-list" id="routeSuggestions"></div>
      </div>
    </div>
    <div class="search-section">
      <h4>Search by Endpoints</h4>
      <label>Endpoint 1 Terminal</label>
      <div class="suggestions"><input id="ep1Terminal" type="text" class="small-input" placeholder="Type terminal..." autocomplete="off" /><div class="suggestions-list" id="ep1TerminalSuggestions"></div></div>
      <hr>
      <label>Endpoint 2 Terminal</label>
      <div class="suggestions"><input id="ep2Terminal" type="text" class="small-input" placeholder="Type terminal..." autocomplete="off" /><div class="suggestions-list" id="ep2TerminalSuggestions"></div></div>
    </div>
    <button class="btn apply" onclick="applyFilters()">🔍 Apply Filters</button>
    <button class="btn clear" onclick="resetFilters()">♻️ Clear Filters</button>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>

  <script>
    const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRyCBsc0sCJs7FXH1Q1XEiCuMrV_ckVg9tcMvozYThFJfqpcOPdlo6YqxBYf6I1zHO0-yQZ_vz3knSS/pub?gid=1233383270&single=true&output=csv";
    const terminalCsvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRyCBsc0sCJs7FXH1Q1XEiCuMrV_ckVg9tcMvozYThFJfqpcOPdlo6YqxBYf6I1zHO0-yQZ_vz3knSS/pub?gid=1448318988&single=true&output=csv";
    const PALETTE = ['#0b3d91','#1b5e20','#b71c1c','#ff6f00','#4a148c','#3e2723','#263238','#006064','#004d40','#0d47a1'];
    const TERMINAL_ICON_DIAMETER = 12;

    function normalize(s){ if(!s && s!==0) return ''; return String(s).trim(); }
    function nLower(s){ return normalize(s).toLowerCase(); }
    function colorFromString(str){
      let hash = 0;
      for(let i=0;i<str.length;i++){ hash = (hash<<5) - hash + str.charCodeAt(i); hash |= 0; }
      return PALETTE[Math.abs(hash) % PALETTE.length];
    }

    const map = L.map('map', { preferCanvas:true }).setView([13,122],6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    let routes = [], terminalMarkers = [], selectedRouteNames = [];
    const terminalLayerGroup = L.layerGroup().addTo(map);

    // --- THE STITCHER LOGIC ---
    // This function looks at the row and combines all columns for Path 1 and Path 2
    function getFullGeoPath(row) {
      let combinedPaths = [];
      
      // Stitch Path 1 (1-1 to 1-8)
      let fullPath1 = "";
      for(let i=1; i<=8; i++) {
        fullPath1 += normalize(row[`GEO PATH 1-${i}`] || "");
      }
      if(fullPath1) combinedPaths.push(parseGeo(fullPath1));

      // Stitch Path 2 (2-1 to 2-8)
      let fullPath2 = "";
      for(let i=1; i<=8; i++) {
        fullPath2 += normalize(row[`GEO PATH 2-${i}`] || "");
      }
      if(fullPath2) combinedPaths.push(parseGeo(fullPath2));

      return combinedPaths.filter(p => p !== null);
    }

    function parseGeo(jsonStr) {
      try {
        const parsed = JSON.parse(jsonStr);
        if(Array.isArray(parsed[0]) && Array.isArray(parsed[0][0])) return parsed.map(seg => seg.map(c => L.latLng(+c[1], +c[0])));
        return [parsed.map(c => L.latLng(+c[1], +c[0]))];
      } catch(e) { return null; }
    }

    function init() {
      Papa.parse(csvUrl, {
        download: true, header: true,
        complete: function(results) {
          results.data.forEach(row => {
            const stitchedPaths = getFullGeoPath(row);
            if(!stitchedPaths.length) return;

            const name = normalize(row["ROUTE NAME"] || row["DENO"]);
            const baseColor = colorFromString(name);
            const group = L.layerGroup();

            stitchedPaths.forEach(segs => {
              segs.forEach(seg => {
                L.polyline(seg, { color: baseColor, weight: 2, opacity: 0.9 }).addTo(group);
              });
            });

            routes.push({ row, layerGroup: group, baseColor, id: name, stitchedPaths });
            group.addTo(map);
          });
          loadTerminals();
        }
      });
    }

    function loadTerminals() {
      Papa.parse(terminalCsvUrl, {
        download: true, header: true,
        complete: function(results) {
          results.data.forEach(r => {
            const lat = parseFloat(r["LATITUDE"]), lng = parseFloat(r["LONGITUDE"]);
            if(isNaN(lat) || isNaN(lng)) return;
            const marker = L.marker([lat, lng], {
              icon: L.divIcon({
                className: '',
                html: `<div class="terminal-marker" style="width:12px;height:12px;background:#34495e;border-radius:50%"></div>`,
                iconSize: [12, 12]
              })
            }).bindPopup(r["TERMINAL"]);
            marker.addTo(terminalLayerGroup);
            terminalMarkers.push({ row: r, marker });
          });
        }
      });
    }

    function applyFilters() {
      const ep1 = nLower(document.getElementById('ep1Terminal').value);
      const ep2 = nLower(document.getElementById('ep2Terminal').value);
      
      routes.forEach(rt => {
        const r1 = nLower(rt.row["ENDPOINT 1 TERMINAL"] || "");
        const r2 = nLower(rt.row["ENDPOINT 2 TERMINAL"] || "");
        const match = (!ep1 || r1.includes(ep1) || r2.includes(ep1)) && 
                      (!ep2 || r1.includes(ep2) || r2.includes(ep2));
        
        if(match) rt.layerGroup.addTo(map);
        else map.removeLayer(rt.layerGroup);
      });
    }

    function resetFilters() {
      document.querySelectorAll('input').forEach(i => i.value = '');
      routes.forEach(rt => rt.layerGroup.addTo(map));
    }

    init();
  </script>
</body>
</html>
