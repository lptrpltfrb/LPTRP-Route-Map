<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Route Map</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet-control-geocoder/2.4.0/Control.Geocoder.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/css/select2.min.css"/>
<style>
  #map { width: 1170px; height: 800px; }
  .custom-control { background: white; padding: 10px; border-radius: 5px; box-shadow: 0 0 6px rgba(0,0,0,0.3);}
  .select2-container { width: 100% !important; }
</style>
</head>
<body>
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-control-geocoder/2.4.0/Control.Geocoder.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/js/select2.full.min.js"></script>

<script>
// --- CONFIG ---
// Your published Google Sheet CSV URL
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRyCBsc0sCJs7FXH1Q1XEiCuMrV_ckVg9tcMvozYThFJfqpcOPdlo6YqxBYf6I1zHO0-yQZ_vz3knSS/pub?gid=1233383270&single=true&output=csv";

// Map initialization
const map = L.map('map').setView([12.8797, 121.7740], 6);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

// Controls container
const controls = L.control({position: 'topleft'});
controls.onAdd = function(map){
    const div = L.DomUtil.create('div', 'custom-control');
    div.innerHTML = `
      <div><strong>Search by Route Name</strong><br/><select id="route-name-select"></select></div><br/>
      <div><strong>Search by Endpoints</strong><br/>
        <select id="pointA-select"></select><br/>
        <select id="pointB-select"></select><br/>
        <select id="via-select"></select>
      </div>
    `;
    return div;
};
controls.addTo(map);

// Data storage
let routesData = [];
let routeLayers = [];

// Helper: combine GEO PATH segments into one array
function combineGeoPath(route, direction){
    const segments = [];
    for(let i=1;i<=5;i++){
        const colName = `GEO PATH ${direction}-${i}`;
        if(route[colName] && route[colName].trim() !== ""){
            try{
                const seg = JSON.parse(route[colName]);
                if(Array.isArray(seg)) segments.push(...seg);
            } catch(e){
                console.warn("Invalid JSON in", colName, e);
            }
        }
    }
    return segments.length ? segments : null;
}

// Helper: create popup HTML
function createPopup(route){
    return `
      <b>${route['ROUTE NAME']}</b><br/>
      DENO: ${route['DENO'] || ''}<br/>
      NAU: ${route['NO. OF AUTHORIZED UNITS'] || ''}<br/>
      CLASSIFICATION: ${route['ROUTE CLASSIFICATION (if LPTRP)'] || ''}<br/>
      <button onclick="showDirection2('${route['ROUTE NAME']}')">Show Direction 2</button>
    `;
}

// Load CSV
Papa.parse(CSV_URL, {
    download: true,
    header: true,
    complete: function(results){
        routesData = results.data.filter(r => r['GEO PATH 1-1'] && r['GEO PATH 1-1'].trim() !== "");
        populateFilters();
        plotRoutes('1'); // show Direction 1 by default
    }
});

// Plot routes by direction
function plotRoutes(direction){
    // Remove existing layers
    routeLayers.forEach(l => map.removeLayer(l));
    routeLayers = [];

    const colorScale = d3.schemeCategory10;
    let colorIndex = 0;

    routesData.forEach(route=>{
        const geo = combineGeoPath(route, direction);
        if(!geo) return;
        const poly = L.polyline(geo, {color: colorScale[colorIndex % colorScale.length], weight:4}).addTo(map);
        poly.bindPopup(createPopup(route));
        routeLayers.push(poly);
        colorIndex++;
    });
}

// Filter population
function populateFilters(){
    const routeNames = [...new Set(routesData.map(r=>r['ROUTE NAME']).filter(n=>n))].sort();
    const routeSelect = document.getElementById('route-name-select');
    routeNames.forEach(name=>{
        const opt = document.createElement('option');
        opt.value = name; opt.textContent = name;
        routeSelect.appendChild(opt);
    });
    $('#route-name-select').select2({placeholder:"Select Route Name"});

    // Endpoint selects (PointA, PointB, Via)
    const pointAOptions = [...new Set(routesData.map(r=>r['ENDPOINT 1 LGU']).filter(n=>n))].sort();
    const pointBOptions = [...new Set(routesData.map(r=>r['ENDPOINT 2 LGU']).filter(n=>n))].sort();
    const viaOptions = [...new Set(routesData.map(r=>r['ROUTE STRUCTURE']).filter(n=>n))].sort();

    const pointASelect = document.getElementById('pointA-select');
    pointAOptions.forEach(v=>{ const o=document.createElement('option'); o.value=v;o.textContent=v;pointASelect.appendChild(o); });
    $('#pointA-select').select2({placeholder:"Point A"});

    const pointBSelect = document.getElementById('pointB-select');
    pointBOptions.forEach(v=>{ const o=document.createElement('option'); o.value=v;o.textContent=v;pointBSelect.appendChild(o); });
    $('#pointB-select').select2({placeholder:"Point B"});

    const viaSelect = document.getElementById('via-select');
    viaOptions.forEach(v=>{ const o=document.createElement('option'); o.value=v;o.textContent=v;viaSelect.appendChild(o); });
    $('#via-select').select2({placeholder:"via (optional)"});
}

// Show Direction 2 for a route
function showDirection2(routeName){
    const route = routesData.find(r=>r['ROUTE NAME']===routeName);
    if(!route) return;
    const geo2 = combineGeoPath(route,'2');
    if(!geo2) { alert("No Direction 2 for this route."); return; }

    // Remove existing layers
    routeLayers.forEach(l => map.removeLayer(l));
    routeLayers = [];

    const poly = L.polyline(geo2, {color:'red', weight:4}).addTo(map);
    poly.bindPopup(createPopup(route));
    routeLayers.push(poly);
    map.fitBounds(poly.getBounds());
}

</script>
</body>
</html>
