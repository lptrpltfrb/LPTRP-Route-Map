<!DOCTYPE html>
<html>
<head>
  <title>LPTRP Route Map — Routes + Terminals</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    html,body{height:100%;margin:0;padding:0;background:#f5f6f7}
    #map { width: 1200px; height: 750px; margin: 10px auto; box-shadow: 0 2px 6px rgba(0,0,0,.15); }

    /* ----- Filter box (kept like your working layout) ----- */
    .search-container {

      left: 12px;
      top: 12px;

    input[type="text"], .small-input {

    .suggestions { position: relative; }

    .north-arrow {
      position: absolute;
      right: 18px;

      z-index: 2000;
      width: 40px;

      background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><g fill="%23000"><path d="M50 5 L70 70 L50 55 L30 70 Z"/></g><text x="50" y="95" font-size="12" text-anchor="middle" fill="%23000">N</text></svg>') no-repeat center/contain;

    }

    .search-container::-webkit-scrollbar { width:8px; height:8px }
    .search-container::-webkit-scrollbar-thumb { background:#ddd; border-radius:8px }

    /* small popup for hover count */
    .hover-count .leaflet-popup-content { margin:6px 8px; font-weight:700; font-size:13px; text-align:center; color:#fff; }
    .hover-count .leaflet-popup-content-wrapper { background: rgba(0,0,0,0.8); border-radius:6px; }

    /* route list panel (lower-right) */
    .route-list-panel {
      position: absolute;
      right: 12px;
      bottom: 12px;
      z-index: 5000;
      min-width: 300px;

.details-panel {

  bottom: 12px;
  z-index: 5000;

  max-width: 420px;

  overflow:auto;

}

    .route-list-panel .header { font-weight:700; margin-bottom:8px; }
    .route-list-panel .route-item { padding:6px 8px; border-radius:6px; cursor:pointer; }

    .terminal-popup .leaflet-popup-content { font-size:13px; }

</head>

  <!-- Scripts -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>

  <script>
    // -----------------------
    // CONFIG
    // -----------------------
    // Routes CSV (your main sheet)
    const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRyCBsc0sCJs7FXH1Q1XEiCuMrV_ckVg9tcMvozYThFJfqpcOPdlo6YqxBYf6I1zHO0-yQZ_vz3knSS/pub?gid=1233383270&single=true&output=csv";
    // Terminals CSV (Terminal tab)
    const terminalCsvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRyCBsc0sCJs7FXH1Q1XEiCuMrV_ckVg9tcMvozYThFJfqpcOPdlo6YqxBYf6I1zHO0-yQZ_vz3knSS/pub?gid=1448318988&single=true&output=csv";
    // Train routes CSV
    const trainCsvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRyCBsc0sCJs7FXH1Q1XEiCuMrV_ckVg9tcMvozYThFJfqpcOPdlo6YqxBYf6I1zHO0-yQZ_vz3knSS/pub?gid=168170160&single=true&output=csv";


function drawTrainRoutes(data){

    trainLayerGroup.clearLayers();
    trainStations = [];
    trainRoutes = [];

    data.forEach(row => {

        const type = nLower(row["TYPE"]);

        // -------------------------
        // TRAIN LINE
        // -------------------------
        if(type === "line"){

            const segs = tryParseGeoPath(row["GEO PATH"]);
            if(!segs || !segs.length) return;

            const trainObj = {
                name: normalize(row["NAME"] || row["LINE"] || row["ROUTE NAME"] || "Train Line").toUpperCase(),
                segs: segs,
                layers: []
            };

            trainRoutes.push(trainObj);

segs.forEach(seg => {

const base = L.polyline(seg, {
    color: "#222",
    weight: 5,
    opacity: 0.9
})
.on('click', (ev) => {
    L.DomEvent.stopPropagation(ev);
    handlePointClick(ev.latlng);
})
.addTo(trainLayerGroup);

const sleeper = L.polyline(seg, {
    color: "#fff",
    weight: 2,
    dashArray: "1,8",
    opacity: 0.9
})
.on('click', (ev) => {
    L.DomEvent.stopPropagation(ev);
    handlePointClick(ev.latlng);
})
.addTo(trainLayerGroup);
    trainObj.layers.push(base, sleeper);
});       
}

        // -------------------------
        // STATIONS
        // -------------------------
        if(type === "station"){

            const lat = parseFloat(row["LAT"]);
            const lng = parseFloat(row["LNG"]);
            const name = normalize(row["STATION NAME"]);

            if(!Number.isNaN(lat) && !Number.isNaN(lng) && name){

const lineName =
  normalize(row["LINE"]) ||
  normalize(row["LINE NAME"]) ||
  normalize(row["ROUTE NAME"]) ||
  normalize(row["NAME"]) ||
  "Train";

const popupHtml = `
  <div style="text-align:center;">
    <div style="font-weight:700;">${name}</div>
    <div style="font-style:italic;">(${lineName} Sta.)</div>
  </div>
`;

const icon = L.divIcon({
    className: '',
    html: `
      <div style="
        width:14px;
        height:14px;
        background:#555;
        border:2px solid #fff;
        border-radius:50%;
        display:flex;
        align-items:center;
        justify-content:center;
        font-size:11px;
        color:#fff;
        font-weight:bold;
      ">🚆</div>
    `,
    iconSize: [14,14],
    iconAnchor: [7,7]
});

const marker = L.marker([lat,lng], { icon })
    .bindPopup(popupHtml);

marker.addTo(trainLayerGroup);
trainStations.push(marker);            }
        }

    });
}

// -----------------------
// TOGGLE TRAIN LAYER
// -----------------------
function toggleTrains(){
    const show = document.getElementById("showTrains").checked;
    if(show) {
        if (!map.hasLayer(trainLayerGroup)) map.addLayer(trainLayerGroup);
    } else {
        if (map.hasLayer(trainLayerGroup)) map.removeLayer(trainLayerGroup);
    }
}

    // Palette (route coloring)
    const PALETTE = ['#0b3d91','#1b5e20','#b71c1c','#ff6f00','#4a148c','#3e2723','#263238','#006064','#004d40','#0d47a1'];

    // Terminal icon diameter in px — change this to resize terminal circle icons.
    // If it's overtaking route lines, reduce this value (e.g. set to 8 or 10).
    const TERMINAL_ICON_DIAMETER = 12; // <--- adjust here (px)

    // Known terminal types (case-insensitive keys)
    const TERMINAL_TYPE_LABELS = {
      'jeepney terminal': 'J',
      'bus terminal': 'B',
      'van terminal': 'V',
      'common terminal': 'CT',
      'itx': 'ITX',
      'tricycle': 'T',
      'tricycle terminal': 'T',
      'offstreet terminal': 'OT',
      'garage': 'G'
    };
    const TERMINAL_TYPE_COLORS = {
      'jeepney terminal': '#f39c12',
      'bus terminal': '#e74c3c',
      'van terminal': '#27ae60',
      'common terminal': '#8e44ad',
      'itx': '#2980b9',
      'tricycle': '#16a085',
      'offstreet terminal': '#2c3e50',
      'garage': '#7f8c8d'
    };

    // -----------------------
    // UTILS
    // -----------------------
    function normalize(s){ if(!s && s!==0) return ''; return String(s).replace(/[\u200B-\u200D\uFEFF]/g,'').replace(/\s+/g,' ').trim(); }
    function nLower(s){ return normalize(s).toLowerCase(); }
    function colorFromString(str){
      const s = normalize(str||'');
      let hash = 0;
      for(let i=0;i<s.length;i++){ hash = (hash<<5) - hash + s.charCodeAt(i); hash |= 0; }
      return PALETTE[Math.abs(hash) % PALETTE.length];
    }
    function uniqueSorted(arr){ return [...new Set(arr.map(v=>normalize(v)).filter(Boolean))].sort((a,b)=>a.localeCompare(b)); }

    // Haversine (if ever needed)
    function haversine(a,b){
      const R=6371000;
      const dLat=(b.lat-a.lat)*Math.PI/180;
      const dLng=(b.lng-a.lng)*Math.PI/180;
      const lat1=a.lat*Math.PI/180, lat2=b.lat*Math.PI/180;
      const sinDLat=Math.sin(dLat/2), sinDLng=Math.sin(dLng/2);
      const h=sinDLat*sinDLat + Math.cos(lat1)*Math.cos(lat2)*sinDLng*sinDLng;
      return 2*R*Math.asin(Math.sqrt(h));
    }
    function totalLengthKm(paths){
      let m=0;
      for(const seg of paths){
        for(let i=1;i<seg.length;i++){ m+=haversine(seg[i-1],seg[i]); }
      }
      return m/1000;
    }

    // distance (px) from point P to segment AB in screen space
    function distPointToSeg(P,A,B){
      const vx=B.x-A.x, vy=B.y-A.y;
      const wx=P.x-A.x, wy=P.y-A.y;
      const c1=vx*wx+vy*wy;
      if(c1<=0) return Math.hypot(P.x-A.x,P.y-A.y);
      const c2=vx*vx+vy*vy;
      if(c2<=c1) return Math.hypot(P.x-B.x,P.y-B.y);
      const t=c1/c2;
      const proj={x:A.x+t*vx,y:A.y+t*vy};
      return Math.hypot(P.x-proj.x,P.y-proj.y);
    }

    // -----------------------
    // MAP
    // -----------------------
    const map = L.map('map', { preferCanvas:true }).setView([13,122],6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18,attribution:'© OpenStreetMap'}).addTo(map);
    L.control.scale({position:'bottomleft',metric:true}).addTo(map);

   // Train layer and stations
   let trainLayerGroup = L.layerGroup().addTo(map);
   let trainStations = [];

    let allData = [];
    let routes = []; // { row, segs, layerGroup, baseColor, id }
    let visibleLayers = [];
    let selectedRoute = null;
    let selectedTrain = null;
    let trainRoutes = []; // for hover detection

    let dataLoaded = false;

    // Terminals
    let terminals = []; // { row, marker }
    let terminalLayerGroup = L.layerGroup();
    let terminalMarkers = [];

    const hoverPopup = L.popup({autoClose:false, closeButton:false, className:'hover-count', autoPan:false});
    let detailsPopup = null;
    let routeListPanel = null;
    let detailsPanel = null;

    // -----------------------
    // ROUTE LIST PANEL (lower-right)
    // -----------------------
    function showRouteListPanel(names){
      hideRouteListPanel();

      routeListPanel = document.createElement('div');
      routeListPanel.className = 'route-list-panel';
      routeListPanel.addEventListener('click', e => e.stopPropagation());

      const header = `<div class="header">Routes at this point (${names.length})</div>`;
      const itemsHtml = names.map(n => `<div class="route-item" data-name="${n}">${n}</div>`).join('');
      routeListPanel.innerHTML = header + itemsHtml;

      map.getContainer().appendChild(routeListPanel);

      routeListPanel.querySelectorAll('.route-item').forEach(el => {
        el.addEventListener('click', (ev) => {
          const name = ev.currentTarget.getAttribute('data-name');
          selectRouteByName(name);
        });
      });
    }
    function hideRouteListPanel(){
      if(routeListPanel && routeListPanel.parentNode){
        routeListPanel.parentNode.removeChild(routeListPanel);
        routeListPanel = null;
      }
    }

function showDetailsPanel(html){

  if(detailsPanel){
    detailsPanel.innerHTML = buildDetailsHTML(html);
    return;
  }

  detailsPanel = document.createElement('div');
  detailsPanel.className = 'details-panel';
  detailsPanel.innerHTML = buildDetailsHTML(html);

  map.getContainer().appendChild(detailsPanel);
}

function hideDetailsPanel(){
  if(detailsPanel && detailsPanel.parentNode){
    detailsPanel.parentNode.removeChild(detailsPanel);
    detailsPanel = null;
  }
}

function buildDetailsHTML(content){
  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <strong>Route Details</strong>
      <button onclick="hideDetailsPanel()" style="border:none;background:none;cursor:pointer;font-size:16px">✖</button>
    </div>
    ${content}
  `;
}

    // -----------------------
    // FILTER helpers
    // -----------------------
    let selectedRouteNames = [];
    function addRouteChip(name){ const n=normalize(name); if(!n || selectedRouteNames.includes(n)) return; selectedRouteNames.push(n); renderChips(); }
    function removeRouteChip(name){ selectedRouteNames = selectedRouteNames.filter(x=>x!==normalize(name)); renderChips(); }
    function renderChips(){ const c=document.getElementById('routeChips'); c.innerHTML=''; for(const n of selectedRouteNames){ const ch=document.createElement('div'); ch.className='chip'; const t=document.createElement('span'); t.textContent=n; const b=document.createElement('button'); b.innerHTML='&times;'; b.onclick=()=>removeRouteChip(n); ch.appendChild(t); ch.appendChild(b); c.appendChild(ch); } }

    // Improved autocomplete: shows suggestions while typing, pointerdown used so blur doesn't block selection.
    function makeAutocomplete(inputEl, suggestionArray, containerEl, onPick){
      function show(){
        const q=nLower(inputEl.value);
        const list = suggestionArray.filter(s=>nLower(s).includes(q)).slice(0,200);
        renderSuggestions(containerEl, list, onPick, inputEl);
      }
      inputEl.addEventListener('input', show);
      inputEl.addEventListener('focus', show);
      // increase blur delay a bit for pointerdown edge cases
      inputEl.addEventListener('blur', ()=>setTimeout(()=>containerEl.style.display='none',250));
    }
    function renderSuggestions(containerEl, list, onPick, inputEl){
      if(!list.length){ containerEl.style.display='none'; containerEl.innerHTML=''; return; }
      containerEl.innerHTML = '';
      for(const v of list){
        const d = document.createElement('div');
        d.textContent = v;
        // pointerdown registers before blur, preventing suggestions from disappearing before click
        d.addEventListener('pointerdown', (ev)=>{
          ev.preventDefault();
          // set input value and call pick handler
          inputEl.value = v;
          try{ onPick(v); }catch(e){}
          containerEl.style.display='none';
          // keep focus so keyboard can continue if user wants
          inputEl.focus();
          // immediately apply filters when a suggestion is picked
          try{ applyFilters(); }catch(e){}
        });
        containerEl.appendChild(d);
      }
      containerEl.style.display = 'block';
    }

    // -----------------------
    // GEO PATH parse + draw (routes)
    // -----------------------
    function tryParseGeoPath(geo){
      if(!geo) return null;
      try{
        const parsed = JSON.parse(normalize(geo));
        if(Array.isArray(parsed) && Array.isArray(parsed[0]) && Array.isArray(parsed[0][0])){
          return parsed.map(seg => seg.map(c => L.latLng(+c[1], +c[0])));
        }
        if(Array.isArray(parsed) && Array.isArray(parsed[0]) && typeof parsed[0][0] === 'number'){
          return [ parsed.map(c => L.latLng(+c[1], +c[0])) ];
        }
        return null;
      }catch(e){
        return null;
      }
    }

// -----------------------
    // UPDATED GEO PATH JOINER (FOR LONG ROUTES)
    // -----------------------
function drawRoute(row){
      // 1. Check which display mode is selected in the search panel
      const viewMode = document.querySelector('input[name="pathView"]:checked').value;

      // 2. ALWAYS combine strings for Outbound (GEO PATH 1-1 to 1-8)
      let outboundPath = "";
      for(let i=1; i<=8; i++) {
        outboundPath += (row["GEO PATH 1-" + i] || "");
      }
      const outboundSegs = tryParseGeoPath(outboundPath);

      // 3. ONLY combine strings for Return (GEO PATH 2-1 to 2-8) if mode is "both"
      let returnSegs = null;
      if (viewMode === 'both') {
        let returnPath = "";
        for(let i=1; i<=8; i++) {
          returnPath += (row["GEO PATH 2-" + i] || "");
        }
        returnSegs = tryParseGeoPath(returnPath);
      }

      // If there are no outbound coordinates, we can't draw the route
      if(!outboundSegs || !outboundSegs.length) return null;

      const routeName = normalize(row["ROUTE NAME"] || row["DENO"] || '');
      const baseColor = colorFromString(routeName || (row["DENO"]||''));
      const group = L.layerGroup();

      // Helper function to draw the lines
      const addSegments = (segs) => {
        if(!segs) return;
        for(const seg of segs){
          const poly = L.polyline(seg, { 
            color: baseColor, 
            weight: 2, 
            opacity: 0.95 
          });
          poly.on('click', (ev) => { 
            L.DomEvent.stopPropagation(ev); 
            handlePointClick(ev.latlng); 
          });
          poly.addTo(group);
        }
      };

      // DRAWING LOGIC:
      // Always draw Outbound (1-1 to 1-8)
      addSegments(outboundSegs);

      // ONLY draw Return (2-1 to 2-8) if "both" is selected
      if(viewMode === 'both' && returnSegs) {
        addSegments(returnSegs);
      }

      group.addTo(map);
      const id = routeName || normalize(row["DENO"]||'');
      
      // We store the segments for searching/clicking. 
      // If mode is outbound, we ONLY store outbound segments.
      let finalSegs = outboundSegs;
      if(viewMode === 'both' && returnSegs) {
        finalSegs = outboundSegs.concat(returnSegs);
      }
      
      return { row, segs: finalSegs, layerGroup: group, baseColor, id };
    }

    // -----------------------
    // TERMINALS: icon generation, drawing, interactions
    // -----------------------
    function generateTerminalAbbrev(type){
      if(!type) return '';
      const words = type.trim().split(/\s+/).filter(Boolean);
      if(!words.length) return '';
      // If known type return mapped label
      const key = nLower(type);
      if(TERMINAL_TYPE_LABELS[key]) return TERMINAL_TYPE_LABELS[key];
      // fallback: take first letters of each word (max 3 chars)
      const ab = words.map(w => w.charAt(0).toUpperCase()).join('');
      return ab.length ? ab.slice(0,3) : type.slice(0,2).toUpperCase();
    }
    function terminalColorFor(type){
      const key = nLower(type||'');
      return TERMINAL_TYPE_COLORS[key] || '#34495e';
    }

    function createTerminalDivIcon(type, diameter){
      const label = generateTerminalAbbrev(type);
      const color = terminalColorFor(type);
      const fontSize = Math.max(9, Math.floor(diameter*0.45));
      const html = `<div class="terminal-marker" style="width:${diameter}px;height:${diameter}px;line-height:${diameter}px;font-size:${fontSize}px;background:${color};border-radius:50%">${label}</div>`;
      return L.divIcon({ className: '', html: html, iconSize: [diameter, diameter], iconAnchor: [Math.floor(diameter/2), Math.floor(diameter/2)] });
    }

    function drawTerminals(termRows){
      // clear previous
      try{ terminalLayerGroup.clearLayers(); }catch(e){}
      terminals = [];
      terminalMarkers = [];

      for(const r of termRows){
        const lat = parseFloat(r["LATITUDE"] || r["Latitude"] || r["latitude"]);
        const lng = parseFloat(r["LONGITUDE"] || r["Longitude"] || r["longitude"]);
        const name = normalize(r["TERMINAL"] || r["Terminal"] || r["terminal"] || '');
        const address = normalize(r["ADDRESS"] || r["Address"] || r["address"] || '');
        const type = normalize(r["TYPE"] || r["Type"] || r["type"] || '');

        if(!name || Number.isNaN(lat) || Number.isNaN(lng)) continue;

        const icon = createTerminalDivIcon(type, TERMINAL_ICON_DIAMETER);
        const marker = L.marker([lat, lng], { icon: icon, riseOnHover:true });

        // popup content: name, address (italics), (type) italics inside parentheses ONLY IF TYPE present
        const popupTypeHtml = type ? `<div style="font-style:italic">(${type})</div>` : '';
        const popupHtml = `<div style="font-weight:700;margin-bottom:4px">${name}</div>
                           <div style="font-style:italic;margin-bottom:4px">${address}</div>
                           ${popupTypeHtml}`;

        marker.bindPopup(popupHtml, { className: 'terminal-popup', maxWidth: 280 });

        // hover style handled by CSS scale rule, stop propagation of clicks so map doesn't handle them
        marker.on('mouseover', () => {
          const el = marker.getElement();
          if(el) el.style.zIndex = 6500;
        });
        marker.on('mouseout', () => {
          const el = marker.getElement();
          if(el) el.style.zIndex = '';
        });

        marker.on('click', (ev) => {
          L.DomEvent.stopPropagation(ev); // important: prevents the route-list from opening
          // close route list and route details so user can focus on terminal popup
          hideRouteListPanel();
          if(detailsPopup){ try{ map.removeLayer(detailsPopup); }catch(e){} detailsPopup = null; }
          // open terminal popup
          marker.openPopup();
        });

        marker.addTo(terminalLayerGroup);
        terminals.push({ row: r, marker: marker });
        terminalMarkers.push({ row: r, marker: marker });
      }

      terminalLayerGroup.addTo(map);
    }

    // Filter/show/hide terminal markers according to Endpoint Terminal filters
    function updateTerminalVisibility(ep1TermVal, ep2TermVal){
      const v1 = nLower(ep1TermVal);
      const v2 = nLower(ep2TermVal);
      for(const t of terminalMarkers){
        const name = nLower(t.row["TERMINAL"] || t.row["Terminal"] || t.row["terminal"] || '');
        const matches = (!v1 && !v2) || (v1 && name.includes(v1)) || (v2 && name.includes(v2));
        if(matches){
          if(!map.hasLayer(t.marker)) t.marker.addTo(map);
        } else {
          if(map.hasLayer(t.marker)) map.removeLayer(t.marker);
        }
      }
    }


    // -----------------------
    // FILTERS
    // -----------------------
    // Note: special terminal matching logic implemented such that
    // - if only ep1Terminal typed => match routes that have that terminal in either endpoint
    // - if only ep2Terminal typed => same
    // - if both typed => require route to reference both terminal names (in any endpoint)
function applyFilters(){

      if(!dataLoaded) return;

      const rSelected = selectedRouteNames.map(n=>nLower(n));
      const ep1RegionVal=nLower(document.getElementById('ep1Region').value);
      const ep1ProvinceVal=nLower(document.getElementById('ep1Province').value);
      const ep1LGUVal=nLower(document.getElementById('ep1LGU').value);
      const ep1BarangayVal=nLower(document.getElementById('ep1Barangay').value);
      const ep1TerminalVal=nLower(document.getElementById('ep1Terminal').value);
      const ep2RegionVal=nLower(document.getElementById('ep2Region').value);
      const ep2ProvinceVal=nLower(document.getElementById('ep2Province').value);
      const ep2LGUVal=nLower(document.getElementById('ep2LGU').value);
      const ep2BarangayVal=nLower(document.getElementById('ep2Barangay').value);
      const ep2TerminalVal=nLower(document.getElementById('ep2Terminal').value);

      // 1. Clear Map
      clearSelectionAndPopups();
      routes.forEach(rt => { if(map.hasLayer(rt.layerGroup)) map.removeLayer(rt.layerGroup); });
      
      routes = []; 
      visibleLayers = [];

      // 2. This is the "Loop through allData" part
      for(const row of allData){
        
        // --- SAFETY & STATUS FILTERS ---
        // Skip if GEO PATH 1-1 is empty
        if(!row["GEO PATH 1-1"] || row["GEO PATH 1-1"].trim() === "") continue;
        
        // Skip if STATUS is "Superseded"
        const statusVal = nLower(row["STATUS"] || row["Status"] || '');
        if(statusVal === "superseded") continue;
        // -------------------------------

        const rn = nLower(row["ROUTE NAME"]||'');
        const matchRoute = rSelected.length===0 || rSelected.includes(rn);
        
        const ep1OK = (!ep1RegionVal || nLower(row["ENDPOINT 1 REGION"]||'').includes(ep1RegionVal)) &&
                      (!ep1ProvinceVal || nLower(row["ENDPOINT 1 PROVINCE"]||'').includes(ep1ProvinceVal)) &&
                      (!ep1LGUVal || nLower(row["ENDPOINT 1 LGU"]||'').includes(ep1LGUVal)) &&
                      (!ep1BarangayVal || nLower(row["ENDPOINT 1 BARANGAY"]||'').includes(ep1BarangayVal));
        
        const ep2OK = (!ep2RegionVal || nLower(row["ENDPOINT 2 REGION"]||'').includes(ep2RegionVal)) &&
                      (!ep2ProvinceVal || nLower(row["ENDPOINT 2 PROVINCE"]||'').includes(ep2ProvinceVal)) &&
                      (!ep2LGUVal || nLower(row["ENDPOINT 2 LGU"]||'').includes(ep2LGUVal)) &&
                      (!ep2BarangayVal || nLower(row["ENDPOINT 2 BARANGAY"]||'').includes(ep2BarangayVal));

        const routeTerm1 = nLower(row["ENDPOINT 1 TERMINAL"]||'');
        const routeTerm2 = nLower(row["ENDPOINT 2 TERMINAL"]||'');
        let terminalOK = true;
        if(ep1TerminalVal && ep2TerminalVal){
          terminalOK = [ep1TerminalVal, ep2TerminalVal].every(req => (routeTerm1.includes(req)) || (routeTerm2.includes(req)));
        } else if(ep1TerminalVal){
          terminalOK = routeTerm1.includes(ep1TerminalVal) || routeTerm2.includes(ep1TerminalVal);
        } else if(ep2TerminalVal){
          terminalOK = routeTerm1.includes(ep2TerminalVal) || routeTerm2.includes(ep2TerminalVal);
        }

        // 3. Re-draw valid routes
        if(matchRoute && ep1OK && ep2OK && terminalOK){
          const rt = drawRoute(row); 
          if(rt) {
            routes.push(rt);
            visibleLayers.push(rt.layerGroup);
          }
        }
      }

      updateTerminalVisibility(ep1TerminalVal, ep2TerminalVal);

      // 4. Fit bounds to results
      const routeLayers = visibleLayers.flatMap(g => g.getLayers());
      const visibleT = terminalMarkers.filter(t => map.hasLayer(t.marker)).map(t=>t.marker);
      const allFeatures = [...routeLayers, ...visibleT];
      if(allFeatures.length){
        try { map.fitBounds(L.featureGroup(allFeatures).getBounds(),{padding:[40,40]}); } catch(e){}
      }
    }

function resetFilters(){
      // 1. Clear text inputs and chips
      selectedRouteNames=[]; 
      renderChips();
      document.querySelectorAll('.search-container input').forEach(i=>i.value='');

      // 2. Reset the Toggle Buttons to default
      const bothRadio = document.querySelector('input[name="pathView"][value="both"]');
      if(bothRadio) bothRadio.checked = true;
      document.getElementById('showTerminals').checked = true;

      // 3. Re-run applyFilters to rebuild the whole map from scratch
      applyFilters();
      
      // 4. Ensure terminal layer is back on
      if(!map.hasLayer(terminalLayerGroup)) {
        map.addLayer(terminalLayerGroup);
      }
    }

    // -----------------------

    // -----------------------
function trainAtPoint(latlng, pxTol=6){

    const P = map.latLngToLayerPoint(latlng);
    const found = [];

    for(const tr of trainRoutes){
        let near = false;

        for(const seg of tr.segs){
            for(let i=1;i<seg.length;i++){
                const A = map.latLngToLayerPoint(seg[i-1]);
                const B = map.latLngToLayerPoint(seg[i]);
                const d = distPointToSeg(P,A,B);

                if(d <= pxTol){
                    near = true;
                    break;
                }
            }
            if(near) break;
        }

        if(near) found.push(tr);
    }

    return found; // ✅ now returns ARRAY (like routes)
}
function routesAtPoint(latlng, pxTol=6){

      const P = map.latLngToLayerPoint(latlng);
      const found = [];
      for(const rt of routes){
        if(!map.hasLayer(rt.layerGroup)) continue;
        let near = false;
        for(const seg of rt.segs){
          for(let i=1;i<seg.length;i++){
            const A = map.latLngToLayerPoint(seg[i-1]);
            const B = map.latLngToLayerPoint(seg[i]);
            const d = distPointToSeg(P,A,B);
            if(d <= pxTol){ near = true; break; }
          }
          if(near) break;
        }
        if(near) found.push(rt);
      }
      const byName = new Map();
      for(const f of found){
        const name = normalize(f.row["ROUTE NAME"]||'');
        if(!byName.has(name)) byName.set(name, f);
      }
      return Array.from(byName.values());
    }

function setHoverHighlights(rtList){
  const newIds = new Set(rtList.map(r=>r.id));

  for(const rt of routes){
    if(!map.hasLayer(rt.layerGroup)) continue;
    if(!newIds.has(rt.id) && (!selectedRoute || rt !== selectedRoute)){
      rt.layerGroup.getLayers().forEach(poly =>
        poly.setStyle({ color: rt.baseColor, weight:2, opacity:0.95 })
      );
    }
  }

  for(const rt of rtList){
    if(selectedRoute && rt === selectedRoute) continue;
    rt.layerGroup.getLayers().forEach(poly =>
      poly.setStyle({ color:'yellow', weight:6, opacity:1 })
    );
    rt.layerGroup.getLayers().forEach(poly => poly.bringToFront());
  }
}

  makeAutocomplete(document.getElementById('ep1Barangay'), suggestions.epBarangay, document.getElementById('ep1BarangaySuggestions'), v=>{document.getElementById('ep1Barangay').value=v; applyFilters();});
  makeAutocomplete(document.getElementById('ep1Terminal'), suggestions.epTerminal, document.getElementById('ep1TerminalSuggestions'), v=>{document.getElementById('ep1Terminal').value=v; applyFilters();});

  makeAutocomplete(document.getElementById('ep2Region'), suggestions.epRegion, document.getElementById('ep2RegionSuggestions'), v=>{document.getElementById('ep2Region').value=v; applyFilters();});
  makeAutocomplete(document.getElementById('ep2Province'), suggestions.epProvince, document.getElementById('ep2ProvinceSuggestions'), v=>{document.getElementById('ep2Province').value=v; applyFilters();});
  makeAutocomplete(document.getElementById('ep2LGU'), suggestions.epLGU, document.getElementById('ep2LGUSuggestions'), v=>{document.getElementById('ep2LGU').value=v; applyFilters();});
  makeAutocomplete(document.getElementById('ep2Barangay'), suggestions.epBarangay, document.getElementById('ep2BarangaySuggestions'), v=>{document.getElementById('ep2Barangay').value=v; applyFilters();});
  makeAutocomplete(document.getElementById('ep2Terminal'), suggestions.epTerminal, document.getElementById('ep2TerminalSuggestions'), v=>{document.getElementById('ep2Terminal').value=v; applyFilters();});

  // -----------------------
  // INITIAL DRAW
  // -----------------------
  for(const row of allData){
    const rt = drawRoute(row);
    if(rt){ routes.push(rt); visibleLayers.push(rt.layerGroup); }
  }

  drawTerminals(terminalsParsed);

  const initialFeatures = visibleLayers.flatMap(g => g.getLayers())
    .concat(terminalMarkers.map(t=>t.marker));

  if(initialFeatures.length){
    map.fitBounds(L.featureGroup(initialFeatures).getBounds(),{padding:[40,40]});
  }

dataLoaded = true;    
applyFilters();    


})
.catch(err => console.error('Failed to load CSVs:', err));

// This handles switching between "By Route" and "By Endpoint" tabs
    function setSearchMode(mode) {
      document.getElementById('sectionRouteSearch').classList.toggle('hidden', mode !== 'route');
      document.getElementById('sectionEndpointSearch').classList.toggle('hidden', mode !== 'endpoint');
      
      document.getElementById('btnModeRoute').classList.toggle('active', mode === 'route');
      document.getElementById('btnModeEndpoint').classList.toggle('active', mode === 'endpoint');
      
      // Reset filters so searches don't "bleed" into each other
      resetFilters(); 
    }

    // This turns the Terminal Icons on and off
    function toggleTerminals() {
      const show = document.getElementById('showTerminals').checked;
      if (show) { 
        if (!map.hasLayer(terminalLayerGroup)) map.addLayer(terminalLayerGroup); 
      } else { 
        if (map.hasLayer(terminalLayerGroup)) map.removeLayer(terminalLayerGroup); 
      }
    }

  </script>
</body>
</html>
